<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Scanner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, -apple-system, sans-serif;
      background: #000;
      overflow: hidden;
    }
    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #scanner {
      width: 100%;
      height: 100%;
    }
    #success {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      z-index: 100;
    }
    #success.active { display: flex; }
    #success .icon {
      width: 80px;
      height: 80px;
      background: #22c55e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    #success .icon svg {
      width: 40px;
      height: 40px;
      stroke: white;
    }
    #success .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    #success .code {
      font-family: monospace;
      font-size: 20px;
      color: #f97316;
      background: rgba(249, 115, 22, 0.1);
      padding: 8px 16px;
      border-radius: 8px;
    }
    #error {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
      text-align: center;
    }
    #error.active { display: flex; }
    #error .message {
      color: #ef4444;
      margin-bottom: 16px;
      font-size: 16px;
    }
    #error button {
      padding: 12px 24px;
      background: #f97316;
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      cursor: pointer;
    }
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      z-index: 50;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="container">
    <div id="loading">
      <div class="spinner"></div>
      <div>Avvio fotocamera...</div>
    </div>
    
    <div id="scanner"></div>
    
    <div id="success">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <div class="title">Codice letto!</div>
      <div class="code" id="code-display"></div>
    </div>
    
    <div id="error">
      <div class="message" id="error-message"></div>
      <button onclick="window.parent.postMessage({type: 'close'}, '*')">Chiudi</button>
    </div>
  </div>

  <script>
    let scanner = null;
    let scanned = false;

    async function initScanner() {
      try {
        scanner = new Html5Qrcode("scanner");
        
        await scanner.start(
          { facingMode: "environment" },
          {
            fps: 10,
          },
          (decodedText, decodedResult) => {
            if (scanned) return;
            scanned = true;
            
            // 1. Estrai codice GC
            const match = decodedText.match(/GC[A-Z0-9]+/);
            const code = match ? match[0] : decodedText;
            
            // 2. Feedback visivo IMMEDIATO
            document.getElementById('code-display').textContent = code;
            document.getElementById('success').classList.add('active');
            
            // 3. Delay prima di chiudere tutto (2000ms = 2 secondi)
            setTimeout(async () => {
              try {
                if (scanner && scanner.isScanning) {
                  await scanner.stop();
                }
                
                // Notifica il parent dopo il delay e lo stop
                window.parent.postMessage({ type: 'scanned', code: code }, '*');
              } catch (stopErr) {
                console.warn("Errore durante lo stop:", stopErr);
                // Invia comunque il messaggio se lo stop fallisce
                window.parent.postMessage({ type: 'scanned', code: code }, '*');
              }
            }, 2000); 
          },
          () => {
            // Errori di scansione ignorati per fluidità
          }
        );
        
        // Nascondi loading
        document.getElementById('loading').classList.add('hidden');
      } catch (err) {
        console.error('Errore:', err);
        document.getElementById('error-message').textContent = 
          'Impossibile accedere alla fotocamera. Verifica i permessi.';
        document.getElementById('error').classList.add('active');
      }
    }

    // Avvia dopo un breve delay iniziale
    setTimeout(initScanner, 100);

    // Cleanup quando la pagina viene chiusa
    window.addEventListener('beforeunload', () => {
      if (scanner && scanner.isScanning) {
        scanner.stop().catch(() => {});
      }
    });
  </script>
</body>
</html>
